# StockRoute web — nginx sunucu yapılandırması (plan §13.3).
#
# Tek origin (reverse proxy) modeli: tarayıcı yalnızca bu sunucuyla konuşur.
# Statik SPA buradan servis edilir; `/api` ve `/socket.io` istekleri api
# container'ına iletilir. Böylece CORS'a gerek kalmaz ve Vite'ın derleme
# zamanında gömdüğü adresler göreli (aynı origin) kalabilir.

upstream stockroute_api {
    # `api`, compose ağındaki servis adıdır; Docker'ın gömülü DNS'i çözer.
    server api:3000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Derlenmiş varlıklar içerik hash'i taşır (index-<hash>.js) — uzun süre
    # önbelleğe alınabilir. index.html ASLA önbelleğe alınmaz, aksi halde
    # yeni sürüm yayınlandığında tarayıcı eski varlık adlarını ister.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # REST istekleri API'ye. `/api` öneki backend'de bulunmadığı için
    # iletilirken soyulur: /api/auth/login → /auth/login.
    location /api/ {
        proxy_pass http://stockroute_api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Backend yönlendirme üretirse (301/302) `Location` başlığı kendi iç
        # adresini gösterir; tarayıcı bu adrese erişemez. Başlık, dışarıdan
        # görünen `/api/` önekine geri yazılır.
        proxy_redirect ~^https?://[^/]+/(.*)$ /api/$1;
    }

    # Socket.io — gerçek zamanlı katman (plan §10).
    #
    # KRİTİK: `Upgrade`/`Connection` başlıkları ve HTTP/1.1 olmadan WebSocket
    # el sıkışması (101 Switching Protocols) gerçekleşmez; socket.io sessizce
    # HTTP long-polling'e düşer ya da hiç bağlanamaz. İstemci `transports:
    # ['websocket']` kullandığı için burada düşüş şansı da yoktur.
    #
    # Yol OLDUĞU GİBİ iletilir (soyulmaz): socket.io hem istemcide hem sunucuda
    # varsayılan `/socket.io` yolunu bekler.
    location /socket.io/ {
        proxy_pass http://stockroute_api;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Uzun ömürlü bağlantı: varsayılan 60 sn okuma zaman aşımı, sessiz
        # kalan bir soketi koparırdı.
        proxy_read_timeout 7d;
        proxy_send_timeout 7d;
    }

    # SPA yönlendirmesi: React Router istemci taraflıdır; /movements gibi
    # yollar sunucuda dosya karşılığı bulunmadığından index.html'e düşülür.
    # Bu olmadan derin bağlantılar ve F5 yenilemesi 404 verir.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
